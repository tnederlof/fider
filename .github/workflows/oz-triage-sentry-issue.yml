name: oz-triage-sentry-issue

on:
  issues:
    types:
      - labeled

jobs:
  triage:
    name: triage-sentry-issue
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'sentry')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Oz triage
        uses: warpdotdev/oz-agent-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG || secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || secrets.SENTRY_PROJECT }}
        with:
          skill: tnederlof/fider:frontend-observability-triage
          prompt: |
            Triage GitHub issue #${{ github.event.issue.number }} as a frontend observability investigation.

            Repository context:
            - Repository: ${{ github.repository }}
            - Issue URL: ${{ github.event.issue.html_url }}
            - Issue number: ${{ github.event.issue.number }}
            - Issue title: ${{ github.event.issue.title }}
            - Issue labels: ${{ join(github.event.issue.labels.*.name, ', ') }}
            - Trigger action: ${{ github.event.action }}

            Issue body:
            ${{ github.event.issue.body || 'No description provided.' }}

            Required outcome:
            1. Read the issue and any comments with gh.
            2. Use the available Sentry credentials and issue context to gather the minimum useful observability evidence.
            3. Inspect the checked out repository for the most likely cause.
            4. If the issue is a high-confidence, small-scope frontend regression with a prudent local fix, implement the minimum safe change, validate it, push a branch, and open a PR that references the issue.
            5. Post exactly one structured triage comment back on the GitHub issue. If a PR was opened, include the PR link and summarize validation; otherwise explain the recommended next action.
            6. If confidence is not high or the fix is not safely bounded, stop at diagnosis-only and do not open a PR.
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          share: team
